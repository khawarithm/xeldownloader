<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downloader Pro Max</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  width:95%;
  max-width:420px;
  background:#1e293b;
  padding:20px;
  border-radius:15px;
}

input, select, button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button {
  background:#22c55e;
  font-weight:bold;
}

.preview img {
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

.progress {
  height:8px;
  background:#334155;
  margin-top:10px;
  border-radius:10px;
  overflow:hidden;
}

.bar {
  height:100%;
  width:0%;
  background:#22c55e;
}

.log {
  font-size:12px;
  margin-top:10px;
  color:#94a3b8;
}
</style>
</head>

<body>

<div class="box">
  <h2>🔥 Downloader Fix Anti Zonk</h2>

  <input id="url" placeholder="Paste TikTok / YouTube link">

  <select id="format">
    <option value="mp4">MP4 Normal</option>
    <option value="mp4hd">MP4 HD</option>
    <option value="mp3">MP3</option>
  </select>

  <button onclick="start()">DOWNLOAD</button>

  <div class="preview" id="preview"></div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <div class="log" id="log"></div>
</div>

<script>
const log = (t) => document.getElementById("log").innerHTML = t;

/* ================= VALID DOWNLOAD ================= */
async function safeDownload(url, filename) {
  const res = await fetch(url);

  const type = res.headers.get("content-type") || "";

  // ❗ BLOCK kalau bukan file
  if (!res.ok || type.includes("text")) {
    throw "INVALID FILE";
  }

  const total = +res.headers.get("content-length");
  const reader = res.body.getReader();

  let received = 0;
  let chunks = [];

  while(true) {
    const {done, value} = await reader.read();
    if(done) break;

    chunks.push(value);
    received += value.length;

    if(total) {
      let percent = Math.floor((received / total) * 100);
      document.getElementById("bar").style.width = percent + "%";
    }
  }

  const blob = new Blob(chunks);
  const link = document.createElement("a");

  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
}

/* ================= MAIN ================= */
async function start() {
  const url = document.getElementById("url").value;
  const format = document.getElementById("format").value;

  document.getElementById("bar").style.width = "0%";
  document.getElementById("preview").innerHTML = "";

  try {
    if(url.includes("tiktok")) {
      await tiktok(url, format);
    } else if(url.includes("youtu")) {
      await youtube(url, format);
    } else {
      log("❌ Link tidak support");
    }
  } catch {
    log("❌ Semua API gagal");
  }
}

/* ================= TIKTOK ================= */
async function tiktok(url, format) {

  const apis = [
    `https://api.siputzx.my.id/api/d/tiktok?url=${url}`,
    `https://chocomilk.amira.us.kg/v1/download/tiktok?url=${url}`
  ];

  for (let api of apis) {
    try {
      log("🔄 Ambil dari API...");

      let res = await fetch(api);
      let json = await res.json();
      let d = json.data || json;

      let video = d.no_watermark_link_hd || d.no_watermark_link || d.media?.video;
      let audio = d.music_link || d.media?.audio;
      let thumb = d.cover_link || d.metadata?.thumbnail;

      if(thumb) {
        document.getElementById("preview").innerHTML = `<img src="${thumb}">`;
      }

      let final;

      if(format === "mp3") {
        if(!audio) throw "no audio";
        final = audio;
      }
      else if(format === "mp4hd") {
        final = d.no_watermark_link_hd || video;
      }
      else {
        final = video;
      }

      if(!final || final.includes("undefined")) throw "bad link";

      try {
        await safeDownload(final, "tiktok." + (format==="mp3"?"mp3":"mp4"));
      } catch {
        window.open(final, "_blank");
      }

      log("✅ Berhasil!");
      return;

    } catch(e) {
      continue;
    }
  }

  throw "fail";
}

/* ================= YOUTUBE ================= */
async function youtube(url, format) {

  const apis = [
    format === "mp3"
      ? `https://api.sxtream.my.id/downloader/ytmp3?url=${url}`
      : `https://api.sxtream.my.id/downloader/ytmp4?url=${url}`,
    `https://chocomilk.amira.us.kg/v1/youtube/download?url=${url}&quality=720&mode=${format==="mp3"?"audio":"video"}`
  ];

  for (let api of apis) {
    try {
      log("🔄 Ambil YouTube...");

      let res = await fetch(api);
      let json = await res.json();

      let link =
        json.data?.download ||
        json.data?.url ||
        json.result?.url;

      if(!link) throw "no link";

      try {
        await safeDownload(link, "youtube." + (format==="mp3"?"mp3":"mp4"));
      } catch {
        window.open(link, "_blank");
      }

      log("✅ YouTube berhasil!");
      return;

    } catch {
      continue;
    }
  }

  throw "fail";
}
</script>

</body>
</html>
