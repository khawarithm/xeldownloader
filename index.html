<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downloader Aesthetic</title>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(-45deg, #0f172a, #1e293b, #020617, #0f172a);
  background-size: 400% 400%;
  animation: bgMove 10s infinite alternate;
  overflow:hidden;
}

@keyframes bgMove {
  0% { background-position:0% 50%; }
  100% { background-position:100% 50%; }
}

/* floating blobs */
.blob {
  position:absolute;
  border-radius:50%;
  filter: blur(80px);
  opacity:0.4;
  animation: float 10s infinite alternate;
}

.blob1 {
  width:300px;
  height:300px;
  background:#22c55e;
  top:10%;
  left:10%;
}

.blob2 {
  width:250px;
  height:250px;
  background:#3b82f6;
  bottom:10%;
  right:10%;
}

@keyframes float {
  0% { transform:translateY(0); }
  100% { transform:translateY(-40px); }
}

/* card */
.box {
  position:relative;
  z-index:10;
  width:90%;
  max-width:400px;
  padding:25px;
  border-radius:20px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
  text-align:center;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1;}
}

h2 {
  margin-bottom:15px;
}

/* input */
input, select, button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  outline:none;
}

/* button */
button {
  background: linear-gradient(45deg, #22c55e, #4ade80);
  color:black;
  font-weight:bold;
  transition:0.3s;
}

button:hover {
  transform:scale(1.05);
}

/* preview */
.preview img {
  width:100%;
  border-radius:15px;
  margin-top:15px;
  animation: fadeIn 0.5s ease;
}

/* loading spinner */
.loader {
  margin-top:15px;
  border:4px solid #334155;
  border-top:4px solid #22c55e;
  border-radius:50%;
  width:40px;
  height:40px;
  animation: spin 1s linear infinite;
  display:none;
}

@keyframes spin {
  100% { transform:rotate(360deg); }
}

/* log */
.log {
  margin-top:10px;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="box">
  <h2>🔥 TikTok Downloader</h2>

  <input id="url" placeholder="Paste link TikTok...">

  <select id="format">
    <option value="mp4">MP4 Normal</option>
    <option value="mp4hd">MP4 HD</option>
    <option value="mp3">MP3</option>
  </select>

  <button onclick="start()">Download</button>

  <div class="loader" id="loader"></div>

  <div class="preview" id="preview"></div>
  <div class="log" id="log"></div>
</div>

<script>
const log = (t) => document.getElementById("log").innerHTML = t;

async function smartDownload(url, filename) {
  try {
    const res = await fetch(url);
    const type = res.headers.get("content-type") || "";

    if (!res.ok || type.includes("text")) throw "bad";

    const blob = await res.blob();

    if(blob.size < 50000) throw "fake";

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();

  } catch {
    window.open(url, "_blank");
  }
}

async function start() {
  const url = document.getElementById("url").value;
  const format = document.getElementById("format").value;

  document.getElementById("loader").style.display = "block";
  document.getElementById("preview").innerHTML = "";
  log("⏳ Loading...");

  const apis = [
    `https://api.siputzx.my.id/api/d/tiktok?url=${url}`,
    `https://chocomilk.amira.us.kg/v1/download/tiktok?url=${url}`
  ];

  for (let api of apis) {
    try {
      let res = await fetch(api);
      let json = await res.json();
      let d = json.data || json;

      let video = d.no_watermark_link_hd || d.no_watermark_link || d.media?.video;
      let audio = d.music_link || d.media?.audio;
      let thumb = d.cover_link || d.metadata?.thumbnail;

      if(thumb){
        document.getElementById("preview").innerHTML =
          `<img src="${thumb}">`;
      }

      let final;

      if(format === "mp3") final = audio;
      else if(format === "mp4hd") final = d.no_watermark_link_hd || video;
      else final = video;

      if(!final) throw "no link";

      await smartDownload(final, "tiktok");

      log("✅ Download berhasil");
      document.getElementById("loader").style.display = "none";
      return;

    } catch(e) {
      continue;
    }
  }

  log("❌ Gagal ambil video");
  document.getElementById("loader").style.display = "none";
}
</script>

</body>
</html>
