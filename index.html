<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Downloader</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  width: 100%;
  max-width: 400px;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: #38bdf8;
  font-weight: bold;
  cursor: pointer;
}

</style>
</head>
<body>

<div class="box">
  <h2>TikTok Downloader</h2>

  <input type="text" id="url" placeholder="Masukkan link TikTok">

  <select id="type">
    <option value="hd">MP4 HD</option>
    <option value="normal">MP4 Normal</option>
  </select>

  <button onclick="download()">Download</button>

  <p id="status"></p>
</div>

<script>
async function download() {
  const url = document.getElementById("url").value;
  const type = document.getElementById("type").value;
  const status = document.getElementById("status");

  if (!url) {
    alert("Masukkan link!");
    return;
  }

  status.innerText = "Mengambil data...";

  try {
    const api = `https://api.sxtream.my.id/downloader/tiktok?url=${encodeURIComponent(url)}`;
    const res = await fetch(api);
    const data = await res.json();

    const list = data.result.data;

    let downloadLink = null;

    for (let i = 0; i < list.length; i++) {
      if (type === "hd" && list[i].type === "nowatermark_hd") {
        downloadLink = list[i].url;
      }
      if (type === "normal" && list[i].type === "nowatermark") {
        downloadLink = list[i].url;
      }
    }

    if (!downloadLink) {
      status.innerText = "Link tidak ditemukan!";
      return;
    }

    status.innerText = "Redirecting...";

    // 🚀 langsung redirect ke file mp4
    window.location.href = downloadLink;

  } catch (err) {
    console.log(err);
    status.innerText = "Terjadi error!";
  }
}
</script>

</body>
</html>
