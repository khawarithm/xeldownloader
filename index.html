<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Universal Downloader</title>

<style>
body {
  margin:0;
  font-family: sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  width:95%;
  max-width:420px;
  background:#1e293b;
  padding:20px;
  border-radius:15px;
}

h2 { text-align:center; }

input, select, button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button {
  background:#22c55e;
  font-weight:bold;
}

.preview img {
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

.progress {
  height:8px;
  background:#334155;
  margin-top:10px;
  border-radius:10px;
  overflow:hidden;
}

.bar {
  height:100%;
  width:0%;
  background:#22c55e;
}

.log {
  font-size:12px;
  margin-top:10px;
  color:#94a3b8;
}
</style>
</head>

<body>

<div class="box">
  <h2>🔥 Downloader Pro</h2>

  <input id="url" placeholder="Paste TikTok / YouTube link">

  <select id="format">
    <option value="mp4">MP4 Normal</option>
    <option value="mp4hd">MP4 HD</option>
    <option value="mp3">MP3</option>
  </select>

  <button onclick="start()">DOWNLOAD</button>

  <div class="preview" id="preview"></div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <div class="log" id="log"></div>
</div>

<script>
const log = (txt) => {
  document.getElementById("log").innerHTML = txt;
}

/* ================= DOWNLOAD ENGINE ================= */
async function directDownload(url, filename) {
  const res = await fetch(url);
  const reader = res.body.getReader();
  const total = +res.headers.get('Content-Length');
  let received = 0;
  let chunks = [];

  while(true) {
    const {done, value} = await reader.read();
    if(done) break;

    chunks.push(value);
    received += value.length;

    let percent = Math.floor((received / total) * 100);
    document.getElementById("bar").style.width = percent + "%";
  }

  const blob = new Blob(chunks);
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
}

/* ================= MAIN ================= */
async function start() {
  const url = document.getElementById("url").value;
  const format = document.getElementById("format").value;

  document.getElementById("bar").style.width = "0%";
  document.getElementById("preview").innerHTML = "";

  try {
    if(url.includes("tiktok")) {
      await tiktok(url, format);
    } else if(url.includes("youtu")) {
      await youtube(url, format);
    } else {
      log("❌ Link tidak didukung");
    }
  } catch(e) {
    log("❌ Semua API gagal");
  }
}

/* ================= TIKTOK ================= */
async function tiktok(url, format) {

  const apis = [
    `https://api.siputzx.my.id/api/d/tiktok?url=${url}`,
    `https://api.sxtream.my.id/downloader/tiktok?url=${url}`,
    `https://chocomilk.amira.us.kg/v1/download/tiktok?url=${url}`
  ];

  for (let api of apis) {
    try {
      log("🔄 Try: " + api);

      let res = await fetch(api);
      let json = await res.json();

      let data = json.data || json;

      let video =
        data.no_watermark_link_hd ||
        data.no_watermark_link ||
        data.media?.video;

      let audio =
        data.music_link ||
        data.media?.audio;

      let thumb =
        data.cover_link ||
        data.metadata?.thumbnail;

      document.getElementById("preview").innerHTML =
        `<img src="${thumb}">`;

      let final;

      if(format === "mp4") final = video;
      else if(format === "mp4hd") final = video;
      else final = audio;

      try {
        await directDownload(final, "tiktok");
      } catch {
        window.location.href = final;
      }

      log("✅ Success pakai API ini");
      return;

    } catch(err) {
      continue;
    }
  }

  throw "fail";
}

/* ================= YOUTUBE ================= */
async function youtube(url, format) {

  const apis = [
    `https://api.sxtream.my.id/downloader/ytmp4?url=${url}`,
    `https://api.sxtream.my.id/downloader/ytmp3?url=${url}`,
    `https://chocomilk.amira.us.kg/v1/youtube/download?url=${url}&quality=720&mode=video`
  ];

  for (let api of apis) {
    try {
      log("🔄 Try: " + api);

      let res = await fetch(api);
      let json = await res.json();

      let link =
        json.data?.download ||
        json.data?.url ||
        json.result?.url;

      if(!link) continue;

      try {
        await directDownload(link, "youtube");
      } catch {
        window.location.href = link;
      }

      log("✅ Success YouTube");
      return;

    } catch(err) {
      continue;
    }
  }

  throw "fail";
}
</script>

</body>
</html>
