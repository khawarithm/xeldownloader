<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Downloader Pro</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  width: 100%;
  max-width: 400px;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: #38bdf8;
  font-weight: bold;
  cursor: pointer;
}

</style>
</head>
<body>

<div class="box">
  <h2>TikTok Downloader</h2>

  <input type="text" id="url" placeholder="Masukkan link TikTok">

  <select id="type">
    <option value="hd">MP4 HD</option>
    <option value="normal">MP4 Normal</option>
    <option value="mp3">MP3</option>
  </select>

  <button onclick="download()">Download</button>

  <p id="status"></p>
</div>

<script>
async function download() {
  const url = document.getElementById("url").value;
  const type = document.getElementById("type").value;
  const status = document.getElementById("status");

  if (!url) {
    alert("Masukkan link!");
    return;
  }

  status.innerText = "Mengambil dari API...";

  // 🔥 LIST API (fallback)
  const apis = [
    `https://api.sxtream.my.id/downloader/tiktok?url=${encodeURIComponent(url)}`,
    `https://api.sxtream.my.id/downloader/aio-v2?url=${encodeURIComponent(url)}`,
    `https://chocomilk.amira.us.kg/v1/download/tiktok?url=${encodeURIComponent(url)}`
  ];

  let downloadLink = null;

  for (let api of apis) {
    try {
      const res = await fetch(api);
      const data = await res.json();

      console.log("API RESULT:", data);

      // =====================
      // ✅ API 1 & 2 (SXTREAM)
      // =====================
      if (data.result) {

        // MP3
        if (type === "mp3" && data.result.music_info?.url) {
          downloadLink = data.result.music_info.url;
        }

        // MP4
        if (data.result.data) {
          for (let item of data.result.data) {
            if (type === "hd" && item.type === "nowatermark_hd") {
              downloadLink = item.url;
            }
            if (type === "normal" && item.type === "nowatermark") {
              downloadLink = item.url;
            }
          }
        }
      }

      // =====================
      // ✅ API 3 (CHOCOMILK)
      // =====================
      if (data.data && data.data.media) {

        if (type === "mp3" && data.data.media.audio) {
          downloadLink = data.data.media.audio;
        }

        if (type === "hd" || type === "normal") {
          downloadLink = data.data.media.video;
        }
      }

      // 🔥 kalau udah dapet langsung stop
      if (downloadLink) break;

    } catch (e) {
      console.log("API ERROR:", e);
    }
  }

  if (!downloadLink) {
    status.innerText = "Semua API gagal 😢";
    return;
  }

  status.innerText = "Redirecting...";

  // 🚀 langsung download
  window.location.href = downloadLink;
}
</script>

</body>
</html>
